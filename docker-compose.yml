version: '3.9'

services:

  # ─── Backend IoT ──────────────────────────────────────────
  backend:
    build: .
    container_name: iot-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info

      # JWT — cambiar por valores seguros en producción
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: iot_occupancy
      DB_USER: iot_app
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: false

      # App
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-false}
      SENSOR_TIMEOUT_MINUTES: 15
      DATA_RETENTION_DAYS: 365
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot-network

  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       iot_occupancy
      POSTGRES_USER:     iot_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_app -d iot_occupancy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network

volumes:
  postgres_data:
    driver: local

networks:
  iot-network:
    driver: bridge
